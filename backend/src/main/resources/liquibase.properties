# Liquibase Configuration
# This file is used by the Liquibase Maven plugin

# Database URL
url=jdbc:postgresql://localhost:5432/janesjeans

# Database credentials
username=root
password=password

# Driver class (usually auto-detected)
driver=org.postgresql.Driver

# ChangeLog file location
changeLogFile=src/main/resources/db/changelog/db.changelog-master.xml

# Contexts to execute (comma-separated)
contexts=dev,docker

# Default schema
defaultSchemaName=

# Liquibase settings
liquibase.shouldRun=false
liquibase.dropFirst=false

# Verbose output
verbose=true
logging=INFO
